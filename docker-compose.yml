services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: Jigong
      POSTGRES_PASSWORD: Jigong
      POSTGRES_DB: Jigong
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U Jigong -d Jigong"]
      interval: 2s
      timeout: 5s
      retries: 30
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  server:
    build: .
    ports:
      - "3100:3100"
    environment:
      DATABASE_URL: postgres://Jigong:Jigong@db:5432/Jigong
      PORT: "3100"
      SERVE_UI: "true"
      Jigong_DEPLOYMENT_MODE: "authenticated"
      Jigong_DEPLOYMENT_EXPOSURE: "private"
      Jigong_PUBLIC_URL: "${Jigong_PUBLIC_URL:-http://localhost:3100}"
      BETTER_AUTH_SECRET: "${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET must be set}"
    volumes:
      - Jigong-data:/Jigong
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
  Jigong-data:
